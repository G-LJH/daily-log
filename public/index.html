<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Daily Log</title>
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <main class="shell">
      <aside class="dates-panel" aria-labelledby="dates-title">
        <div class="brand">
          <h1 id="page-title">Daily Log</h1>
          <p class="subtitle">本地记录，随手保存。</p>
        </div>
        <div class="dates-header">
          <h2 id="dates-title">历史</h2>
          <button id="today-button" class="ghost" type="button">今天</button>
        </div>
        <div id="dates-list" class="dates-list"></div>
      </aside>

      <section class="composer" aria-labelledby="editor-title">
        <div class="topbar">
          <div>
            <h2 id="editor-title">记录</h2>
            <p class="subtitle">可以直接粘贴截图或图片。</p>
          </div>
          <label class="date-field">
            <span>日期</span>
            <input id="entry-date" type="date">
          </label>
        </div>

        <label class="content-label" for="entry-content">今天想记录什么？</label>
        <textarea id="entry-content" placeholder="写下来，保存即可。支持粘贴图片。" rows="12"></textarea>
        <div id="image-preview" class="image-preview" aria-live="polite"></div>

        <div class="actions">
          <button id="save-button" class="primary" type="button">保存</button>
          <button id="cancel-edit-button" class="secondary hidden" type="button">取消编辑</button>
          <span id="status" role="status" aria-live="polite"></span>
        </div>
      </section>

      <section class="history" aria-labelledby="history-title">
        <div class="history-header">
          <h2 id="history-title">当天记录</h2>
          <div class="export-actions">
            <label class="month-field">
              <span>导出月份</span>
              <input id="export-month" type="month">
            </label>
            <button id="export-month-button" class="secondary" type="button">导出本月 Markdown</button>
            <button id="export-all-button" class="secondary" type="button">导出全部</button>
          </div>
        </div>
        <div id="entries-list" class="entries-list"></div>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
